<div id="patient-detail">
    @if (currentPatient$|async; as patient) {
    <p><b>First Name:</b>{{ patient?.first_name}}</p>
    <p><b>Last Name:</b>{{ patient?.last_name}}</p>
    <p><b>Age:</b>{{ patient?.age}}</p>
    <p><b>Gender:</b>{{ patient?.gender}}</p>
    <p><b>Email:</b>{{ patient?.email}}</p>
    <p><b>Country:</b>{{ patient?.country}}</p>
    <p><b>Disease:</b>{{ patient?.disease}}</p>
    <button (click)="deleteCurrentPatient(patient)">Delete</button>
    }
    @else {
    <p>No patient selected yet!</p>
    }
    <button (click)="clearSelection()">Clear</button>
    
</div>
