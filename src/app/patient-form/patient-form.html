<p>{{isEdit ? 'Update Patient':'Add Patient'}}</p>
<form [formGroup]="form" (ngSubmit)="save()">
    <input type="text" placeholder="Enter first name" formControlName="first_name">
    <input type="text" placeholder="Enter last  name" formControlName="last_name">
    <input type="number" placeholder="Enter age" formControlName="age">
    <input type="text" placeholder="Enter gender" formControlName="gender">
    <input type="email" placeholder="Enter email" formControlName="email">
    <input type="text" placeholder="Enter country" formControlName="country">
    <input type="text" placeholder="Enter disease" formControlName="disease"><br>
    <button type="submit" [disabled]="form.invalid">{{ isEdit? 'Update': 'Add'}}</button>
    @if (isEdit) {
    <button type="button" (click)="cancel()">Cancel</button>
    }
</form>
